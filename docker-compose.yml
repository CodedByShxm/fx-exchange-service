version: '3.8'

services:

  db:
    image: postgres:15
    container_name: fx-db
    environment:
      POSTGRES_DB: fxdb
      POSTGRES_USER: fxuser
      POSTGRES_PASSWORD: fxpass
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: fx-service
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fxdb
      SPRING_DATASOURCE_USERNAME: fxuser
      SPRING_DATASOURCE_PASSWORD: fxpass